spring.application.name=coupon-api

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:coupondb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

# Proxy/reverse-proxy support (Dokploy/Nginx/Traefik)
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# OpenAPI / Swagger
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.swagger-ui.url=${SPRINGDOC_SWAGGER_UI_URL:/v3/api-docs}
springdoc.swagger-ui.disable-swagger-default-url=${SPRINGDOC_DISABLE_DEFAULT_URL:true}

# Rate limit
rate.limit.enabled=${RATE_LIMIT_ENABLED:true}
rate.limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:60}
rate.limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
